project:
  name: okvqa-kg-late-fusion
  run_tag: baseline_vilt

data:
  dataset: okvqa
  okvqa_root: data/raw/okvqa
  coco_images_root: data/raw/okvqa/images
  annotations_dir: data/raw/okvqa/annotations
  split: val

  # OK-VQA / VQA-style JSON filenames under annotations_dir
  train_questions_json: "OpenEnded_mscoco_train2014_questions.json"
  train_annotations_json: "mscoco_train2014_annotations.json"
  val_questions_json: "OpenEnded_mscoco_val2014_questions.json"
  val_annotations_json: "mscoco_val2014_annotations.json"

model:
  baseline: vilt

  # Used only for eval sanity-check until you train your own baseline
  pretrained_checkpoint: "dandelin/vilt-b32-finetuned-vqa"

  answer_vocab:
    enabled: true
    top_n: 3000
    path: data/processed/okvqa/answer_vocab.json

training:
  seed: 42
  epochs: 1
  batch_size: 8
  learning_rate: 5e-5
  weight_decay: 0.01
  mixed_precision: false

kg:
  enabled: false
  source: conceptnet
  hop_depth: 1
  top_k: 10
  relation_set: strict
  cache_dir: data/cache/okvqa/slices

fusion:
  mode: none  # none | weighted | gating

logging:
  out_root: experiments/runs
  include_pip_freeze: false

